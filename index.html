<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Blue Room Poem</title>
	<link rel="stylesheet" href="./assets/css/styles.css?v=f3bc910">
</head>
<body>
	<main class="poem-stage" aria-label="Interactive poem">
		<section class="grid-container">
			<div class="title">BLUE ROOM</div>
			<div class="image-panel">
				<img id="portrait-gif" alt="Blue self portrait GIF">
			</div>
			<div class="line line-1">blue light holds my face</div>
			<div class="line line-2">the silent wall breathes slowly</div>
			<div class="line line-3">dark shadows look back</div>
			<div class="line line-6">click and the portrait shifts</div>
		</section>
		<button class="reset-button" type="button">reset</button>
	</main>
	<script src="./assets/js/gif.js"></script>
	<script src="./assets/js/main.js"></script>
</body>
